# Room Makeover Inpainting Prompts
# Used with ComfyUI + ControlNet (Depth or Canny) for the "Predictive In-Painting" feature
# The workflow: load user's room photo → ControlNet preserves structure → inpaint new design

# --- CONTROLNET SETTINGS ---
controlnet:
  model: "control_v11f1p_sd15_depth"  # or canny for edge preservation
  strength: 0.7  # 0.5-0.9 range, higher = more structure preservation
  guidance_start: 0.0
  guidance_end: 1.0

# --- ROOM STYLE PRESETS ---
styles:

  modern_minimalist:
    description: "Clean lines, neutral palette, less is more"
    prompt: >
      modern minimalist living room interior, clean lines, white walls,
      light oak hardwood floors, low-profile beige linen sofa, 
      simple wooden coffee table, single large abstract art piece,
      one fiddle leaf fig plant, warm natural daylight from large windows,
      interior design magazine photograph, architectural digest style,
      warm neutral tones, 8k, photorealistic

  cozy_scandinavian:
    description: "Warm, textured, hygge vibes"
    prompt: >
      cozy scandinavian living room, warm white walls, light wood furniture,
      plush cream boucle sofa with knit throw blanket, sheepskin rug,
      candles on wooden tray, floating wooden shelves with ceramics and books,
      soft warm lighting from table lamps, plants in ceramic pots,
      hygge atmosphere, interior photography, warm color grading

  mid_century_modern:
    description: "Retro-inspired, warm woods, statement pieces"
    prompt: >
      mid-century modern living room, walnut credenza, teak coffee table,
      mustard yellow velvet armchair, geometric patterned rug,
      brass arc floor lamp, abstract framed prints on white wall,
      warm wood tones throughout, natural daylight, vintage modern aesthetic,
      interior design editorial photography, warm tones

  boho_eclectic:
    description: "Layered, colorful, globally inspired"
    prompt: >
      bohemian eclectic living room, terracotta accent wall, rattan furniture,
      colorful moroccan rug, floor cushions, macrame wall hanging,
      hanging plants and trailing vines, woven baskets, warm string lights,
      layered textiles in earth tones, golden hour warm lighting,
      cozy lived-in aesthetic, interior lifestyle photography

  coastal_calm:
    description: "Beach-inspired, light and airy"
    prompt: >
      coastal calm living room, soft blue-grey walls, white shiplap accent,
      natural linen slipcovered sofa, driftwood coffee table,
      woven jute rug, blue and white ceramic vases, coral accents,
      sheer white curtains, bright airy natural light,
      relaxed beach house aesthetic, interior photography, light tones

# --- ROOM-SPECIFIC PROMPTS ---
rooms:

  living_room:
    base: "living room interior design, well-furnished, cohesive design"
    elements: ["sofa", "coffee table", "rug", "lighting", "art", "plants", "shelving"]

  bedroom:
    base: "bedroom interior design, peaceful and restful"
    elements: ["bed with styled bedding", "nightstands", "soft lighting", "curtains", "rug", "art"]

  kitchen:
    base: "kitchen interior design, functional and beautiful"
    elements: ["countertops", "backsplash", "organized shelving", "pendant lights", "bar stools"]

  home_office:
    base: "home office interior design, productive and inspiring"
    elements: ["desk", "ergonomic chair", "task lighting", "organized shelving", "plants", "art"]

  bathroom:
    base: "bathroom interior design, spa-like and clean"
    elements: ["vanity", "mirror", "lighting", "towels", "plants", "accessories"]
